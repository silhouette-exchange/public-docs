# Silhouette blog authors registry.
#
# Sourced from https://silhouette.exchange/#about-section 2026-04-09.
# Every entry has the author's name, title (role), and canonical URL
# (their X profile). image_url is intentionally omitted on most
# entries; BlogByline renders an initials avatar as a fallback, which
# matches the rest of the site's monospace/Orbitron design language
# without requiring per-author headshot assets.
#
# The silhouette-team fallback is kept for posts that are genuinely
# collective (company announcements, multi-author reports, legacy
# imports that predate this registry). Prefer a named author for any
# new post.

